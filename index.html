
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Finance Buddy</title>
    
    <!-- iOS App Integration -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanceBuddy">
    <link rel="apple-touch-icon" href="/vite.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              mono: ['Inter', 'monospace'],
            },
            colors: {
              'dark-bg': '#05070A',
              'dark-card': '#0D1117',
              'primary': '#6C63FF',
              'accent': '#00C9A7',
            },
            boxShadow: {
              'neon-primary': '0 0 5px #6C63FF, 0 0 10px #6C63FF, 0 0 15px #6C63FF',
              'neon-accent': '0 0 5px #00C9A7, 0 0 10px #00C9A7, 0 0 15px #00C9A7',
              'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
            },
            keyframes: {
              gradient: {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
              },
              'bounce-subtle': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              },
              shine: {
                '0%': { transform: 'translateX(-100%) skewX(-12deg)' },
                '100%': { transform: 'translateX(200%) skewX(-12deg)' },
              }
            },
            animation: {
              gradient: 'gradient 6s ease infinite',
              'bounce-subtle': 'bounce-subtle 3s ease-in-out infinite',
              shine: 'shine 3s ease-in-out infinite',
            }
          }
        }
      }
    </script>
    <style>
      .vertical-text {
        writing-mode: vertical-rl;
        text-orientation: mixed;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #05070A;
      }
      ::-webkit-scrollbar-thumb {
        background: #1F2937;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #374151;
      }
    </style>
